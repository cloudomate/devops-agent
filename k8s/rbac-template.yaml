# ── Apply this on EACH MANAGED CLUSTER (not where the agent runs) ─────────────
#
# This gives the devops-agent permission to manage Deployments in target clusters.
# Run: kubectl apply -f rbac-template.yaml --context=<target-cluster>
#
# Then extract the token and add it to the devops-agent-kubeconfig secret.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-agent
  namespace: default   # adjust to the namespace you want to deploy into

---
# ClusterRole — grants Deployment management rights across all namespaces.
# Restrict to specific namespaces with a Role + RoleBinding instead if preferred.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devops-agent
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/rollback", "deployments/scale"]
    verbs: ["create", "update"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devops-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: devops-agent
subjects:
  - kind: ServiceAccount
    name: devops-agent
    namespace: default

---
# Long-lived token Secret (K8s 1.24+)
# After applying, get the token with:
#   kubectl get secret devops-agent-token -n default \
#     --context=<target-cluster> \
#     -o jsonpath='{.data.token}' | base64 -d
apiVersion: v1
kind: Secret
metadata:
  name: devops-agent-token
  namespace: default
  annotations:
    kubernetes.io/service-account.name: devops-agent
type: kubernetes.io/service-account-token
