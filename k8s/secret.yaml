# ── HOW THE AGENT ACCESSES KUBERNETES CLUSTERS ────────────────────────────────
#
# The agent manages deployments across multiple clusters. It needs a kubeconfig
# that contains credentials for each managed cluster. There are two strategies:
#
# STRATEGY A — Merged kubeconfig Secret (simple, works well for ≤10 clusters)
#   Store a single kubeconfig with all cluster contexts in one Secret.
#   Mount it at /app/.kube/config inside the pod.
#   The agent calls: kubectl --context <name> ...
#
# STRATEGY B — Per-cluster ServiceAccount tokens (more secure, scalable)
#   On EACH managed cluster:
#     1. Create a ServiceAccount with the required RBAC (see rbac-template.yaml)
#     2. Generate a long-lived token (or use token projection)
#     3. Store it as a Secret in THIS cluster (where the agent runs)
#     4. The agent references the secret name in the environment config
#
# We use Strategy A here. Generate the Secret with:
#
#   kubectl create secret generic devops-agent-kubeconfig \
#     --from-file=config=$HOME/.kube/config \
#     -n devops-agent \
#     --dry-run=client -o yaml > k8s/secret.yaml
#
# Or merge multiple kubeconfigs first:
#   KUBECONFIG=~/.kube/dev:~/.kube/staging:~/.kube/prod \
#     kubectl config view --flatten > /tmp/merged-kubeconfig
#   kubectl create secret generic devops-agent-kubeconfig \
#     --from-file=config=/tmp/merged-kubeconfig \
#     -n devops-agent

---
# Template — replace <BASE64_KUBECONFIG> with: base64 -w0 ~/.kube/config
apiVersion: v1
kind: Secret
metadata:
  name: devops-agent-kubeconfig
  namespace: devops-agent
type: Opaque
data:
  config: <BASE64_KUBECONFIG>

---
# App secrets (LLM key, GitHub token, etc.)
# Generate with:
#   kubectl create secret generic devops-agent-env \
#     --from-env-file=.env \
#     -n devops-agent
apiVersion: v1
kind: Secret
metadata:
  name: devops-agent-env
  namespace: devops-agent
type: Opaque
stringData:
  LLM_BASE_URL: "https://api.anthropic.com/v1"
  LLM_API_KEY: "sk-ant-REPLACE_ME"
  LLM_MODEL: "claude-opus-4-6"
  GITHUB_TOKEN: "ghp_REPLACE_ME"
  GITHUB_WEBHOOK_SECRET: "REPLACE_ME"
  SECRET_KEY: "REPLACE_ME_WITH_RANDOM_STRING"

---
# SSH private key for SSH-based deployers (optional)
# kubectl create secret generic devops-agent-ssh \
#   --from-file=id_rsa=$HOME/.ssh/id_rsa \
#   -n devops-agent
apiVersion: v1
kind: Secret
metadata:
  name: devops-agent-ssh
  namespace: devops-agent
type: Opaque
data:
  id_rsa: <BASE64_SSH_KEY>
