---
apiVersion: v1
kind: Service
metadata:
  name: devops-agent
  namespace: devops-agent
spec:
  selector:
    app: devops-agent
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP

---
# Ingress — TLS is handled by an upstream reverse proxy (e.g. Traefik on a
# gateway node).  This Ingress does plain HTTP routing inside the cluster.
# Set the host to your actual domain before applying.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-agent
  namespace: devops-agent
  annotations:
    kubernetes.io/ingress.class: traefik   # change to "nginx" if using nginx-ingress
spec:
  rules:
    - host: devops-agent.your-domain.com   # replace
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devops-agent
                port:
                  number: 80
